<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>字怎么走 · 真译</title>
<style>
  :root {
    --paper: #f3ead3;
    --paper-edge: #e7d9b6;
    --ink: #2b2622;
    --ink-soft: #6f6555;
    --rule: #c9b88c;
    --accent: #7a5c2e;
    --ok: #5d6a42;
    --pending: #9a8a6a;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: #d9cba7;
    color: var(--ink);
    font-family: "Songti SC","STSong","SimSun","宋体", serif;
    padding: 28px 18px 64px;
    display: flex;
    justify-content: center;
  }
  .scroll {
    width: 100%; max-width: 1040px;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 38px,
        rgba(160,140,90,.05) 38px, rgba(160,140,90,.05) 39px),
      var(--paper);
    border: 1px solid var(--paper-edge);
    border-radius: 3px;
    box-shadow: 0 10px 40px rgba(60,45,20,.28),
                inset 0 0 60px rgba(160,130,70,.12);
    padding: 38px 36px 48px;
  }

  /* --- 标题区 --- */
  h1 {
    font-size: 28px; font-weight: 600; letter-spacing: .2em;
    margin: 0 0 6px; text-align: center;
  }
  .subtitle {
    text-align: center; color: var(--ink-soft); font-size: 14px;
    letter-spacing: .04em; margin: 0 0 26px; line-height: 1.7;
  }

  /* --- 块网格 --- */
  .blocks {
    display: flex; flex-wrap: wrap; gap: 18px;
  }
  .block {
    flex: 1 1 300px; min-width: 280px;
    background: rgba(255,252,243,.5);
    border: 1px solid rgba(201,184,140,.5);
    border-radius: 3px;
    padding: 18px 18px 20px;
    display: flex; flex-direction: column;
    opacity: 0; /* 等 JS 赋淡入 */
  }
  .block-head {
    display: flex; align-items: baseline; justify-content: space-between;
    gap: 8px; margin-bottom: 4px;
  }
  .block-title {
    font-size: 13.5px; font-weight: 600; letter-spacing: .08em;
    color: var(--accent);
  }
  .badge {
    font-size: 11px; letter-spacing: .05em;
    border: 1px solid; border-radius: 2px;
    padding: 1px 6px; white-space: nowrap;
  }
  .badge.ok      { color: var(--ok); border-color: var(--ok); }
  .badge.pending { color: var(--pending); border-color: var(--pending); }
  .block-caption {
    font-size: 12px; color: var(--ink-soft); line-height: 1.65;
    margin-bottom: 14px; min-height: 40px;
  }

  /* --- 原文（真字形 + 母语方向）--- */
  .original {
    font-size: 26px; line-height: 1.7; color: var(--ink);
    margin-bottom: 12px; min-height: 56px;
  }
  .original.dir-ltr { direction: ltr;  text-align: left;  unicode-bidi: isolate; }
  .original.dir-rtl { direction: rtl;  text-align: right; unicode-bidi: isolate; }
  .original.dir-vertical {
    writing-mode: vertical-rl;
    height: 200px; letter-spacing: .08em;
    align-self: flex-end;
  }

  /* --- 各文字真字形（macOS 系统字体）--- */
  .script-chinese  { font-family: "Songti SC","STSong","宋体", serif; }
  .script-japanese { font-family: "Hiragino Mincho ProN","YuMincho","Hiragino Kaku Gothic ProN", serif; }
  .script-arabic   { font-family: "Geeza Pro","Al Bayan","Baghdad", serif; font-size: 30px; }
  .script-hebrew   { font-family: "Arial Hebrew","Lucida Grande","Times New Roman", serif; font-size: 28px; }
  .script-greek    { font-family: "Times New Roman","Georgia",serif; }
  .script-latin    { font-family: "Georgia","Times New Roman",serif; font-style: italic; }
  .script-sanskrit { font-family: "Devanagari Sangam MN","Kohinoor Devanagari","ITF Devanagari", serif; font-size: 28px; }

  /* --- 转写 / 译文 --- */
  .translit {
    font-family: "Georgia",serif; font-style: italic;
    font-size: 13.5px; color: var(--ink-soft); line-height: 1.6;
    margin-bottom: 10px;
  }
  .gloss {
    font-size: 13.5px; color: var(--ink); line-height: 1.7;
    margin-bottom: 4px;
  }
  .gloss .label { color: var(--accent); font-size: 12px; margin-right: 4px; }
  .gloss.en { color: var(--ink-soft); }
  .source {
    margin-top: auto; padding-top: 12px;
    font-size: 11.5px; color: var(--ink-soft); line-height: 1.55;
    border-top: 1px solid rgba(201,184,140,.4);
  }
  .source .label { color: var(--accent); }

  /* --- 淡入 --- */
  @keyframes fadein {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ──────────────────────────────────────────────────────────────
     字在走：沿各自书写方向的「墨迹揭示」
     原则：文字整体先正确成形（保持 shaping / 连笔），只移动一道
     mask 把它从无到有揭示出来——绝不按字母切，故阿拉伯/希伯来
     连笔不破。七块共用 --dur，同启同收（JS 同时加 .writing 类）。
     ────────────────────────────────────────────────────────────── */
  .original { --dur: 2.2s; }

  /* LTR：从左缘起，向右铺展（希腊 / 拉丁 / 天城体）*/
  .original.writing.dir-ltr {
    -webkit-mask-image: linear-gradient(to right, #000 44%, rgba(0,0,0,0) 72%);
            mask-image: linear-gradient(to right, #000 44%, rgba(0,0,0,0) 72%);
    -webkit-mask-size: 250% 100%; mask-size: 250% 100%;
    -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat;
    -webkit-animation: writeLTR var(--dur) ease-out both;
            animation: writeLTR var(--dur) ease-out both;
  }
  @keyframes writeLTR {
    from { -webkit-mask-position: 100% 0; mask-position: 100% 0; }
    to   { -webkit-mask-position: 0 0;    mask-position: 0 0; }
  }

  /* RTL：从右缘起笔，向左淌（阿拉伯 / 希伯来）*/
  .original.writing.dir-rtl {
    -webkit-mask-image: linear-gradient(to left, #000 44%, rgba(0,0,0,0) 72%);
            mask-image: linear-gradient(to left, #000 44%, rgba(0,0,0,0) 72%);
    -webkit-mask-size: 250% 100%; mask-size: 250% 100%;
    -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat;
    -webkit-animation: writeRTL var(--dur) ease-out both;
            animation: writeRTL var(--dur) ease-out both;
  }
  @keyframes writeRTL {
    from { -webkit-mask-position: 0 0;    mask-position: 0 0; }
    to   { -webkit-mask-position: 100% 0; mask-position: 100% 0; }
  }

  /* 竖排：从上往下落（中文 / 日文，vertical-rl）*/
  .original.writing.dir-vertical {
    -webkit-mask-image: linear-gradient(to bottom, #000 40%, rgba(0,0,0,0) 70%);
            mask-image: linear-gradient(to bottom, #000 40%, rgba(0,0,0,0) 70%);
    -webkit-mask-size: 100% 250%; mask-size: 100% 250%;
    -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat;
    -webkit-animation: writeVERT var(--dur) ease-out both;
            animation: writeVERT var(--dur) ease-out both;
  }
  @keyframes writeVERT {
    from { -webkit-mask-position: 0 100%; mask-position: 0 100%; }
    to   { -webkit-mask-position: 0 0;    mask-position: 0 0; }
  }

  /* --- 控制条：常驻「重走」键 --- */
  .controls {
    text-align: center; margin: 0 0 22px;
  }
  .replay-btn {
    font-family: inherit; font-size: 13px; letter-spacing: .12em;
    color: var(--accent); background: rgba(255,252,243,.6);
    border: 1px solid var(--rule); border-radius: 2px;
    padding: 6px 18px; cursor: pointer;
    transition: background .2s, color .2s;
  }
  .replay-btn:hover { background: var(--accent); color: var(--paper); }
  .replay-btn:active { transform: translateY(1px); }

  /* 尊重系统「减少动态效果」：直接给完整静态版，不揭示 */
  @media (prefers-reduced-motion: reduce) {
    .original.writing.dir-ltr,
    .original.writing.dir-rtl,
    .original.writing.dir-vertical {
      -webkit-mask-image: none; mask-image: none;
      -webkit-animation: none; animation: none;
    }
  }

  /* --- 全局说明 --- */
  .global-note {
    margin-top: 24px;
    font-size: 12.5px; color: var(--ink-soft);
    text-align: center; letter-spacing: .03em; line-height: 1.7;
  }
</style>
</head>
<body>
<div class="scroll">
  <h1>字&thinsp;怎&thinsp;么&thinsp;走&ensp;·&ensp;真&thinsp;译</h1>
  <p class="subtitle">每一块是那门文字里最有名的一句话，<br>用它的原文真身，走它母语的方向。</p>

  <div class="controls">
    <button class="replay-btn" id="replay" type="button">↻ 重&thinsp;走</button>
  </div>

  <div class="blocks" id="blocks"></div>

  <p class="global-note">原文均已核到出处，逐字照录，不作改动。译文为平实直译，不假托具体译家。</p>
</div>

<script>
"use strict";

/* ──────────────────────────────────────────────────────────────
   内容源：History Lab/toys/_字怎么走-真译-内容.md（篇若核准）
   原文 / 转写 / 译文逐字照搬，不生成、不改动。
   渲染按本数组条目数动态进行；状态非「已核准」者不上线。
   方向：ltr 左起横排 / rtl 右起横排 / vertical 竖排右起
   ────────────────────────────────────────────────────────────── */
const ENTRIES = [
  {
    key: "chinese", script: "chinese", dir: "vertical",
    title: "中文（锚）· 李白《静夜思》",
    caption: "竖排右起——简牍一条条往下写、卷轴向右展开，列从右起。",
    original: "床前明月光，疑是地上霜。举头望明月，低头思故乡。",
    translit: "chuáng qián míng yuè guāng, yí shì dì shàng shuāng. jǔ tóu wàng míng yuè, dī tóu sī gù xiāng.",
    en: "Before my bed the bright moonlight— / I wonder if it's frost on the ground. / I lift my head and gaze at the moon, / I lower it and think of home.",
    source: "李白《静夜思》（盛唐），通行选本。",
    status: "已核准"
  },
  {
    key: "japanese", script: "japanese", dir: "vertical",
    title: "日文 · 松尾芭蕉「古池や」",
    caption: "承中文竖排右起；俳句十七音，一气贯下。",
    original: "古池や蛙飛び込む水の音",
    translit: "furu ike ya / kawazu tobikomu / mizu no oto",
    zh: "老池塘——青蛙跃入，水的声响。",
    en: "An old pond— / a frog jumps in, / the sound of water.",
    source: "松尾芭蕉（1686，日本最著名俳句）；americanliterature.com、masterpiece-of-japanese-culture.com 等。",
    status: "已核准"
  },
  {
    key: "arabic", script: "arabic", dir: "rtl",
    title: "阿拉伯文 · 太斯米（Basmala）",
    caption: "从右往左——闪米特诸文的走向，史上被书写最多的一句阿拉伯文。",
    original: "بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ",
    translit: "bi-smi llāhi r-raḥmāni r-raḥīmi",
    zh: "奉至仁至慈的真主之名。",
    en: "In the name of God, the Most Gracious, the Most Merciful.",
    source: "《古兰经》每章卷首语；Wiktionary / Wikipedia「Basmala」/ Tanzil。",
    status: "已核准"
  },
  {
    key: "hebrew", script: "hebrew", dir: "rtl",
    title: "希伯来文 · 创世记 1:1",
    caption: "同从右往左；这是《创世记》的开篇第一句。",
    original: "בְּרֵאשִׁית בָּרָא אֱלֹהִים אֵת הַשָּׁמַיִם וְאֵת הָאָרֶץ",
    translit: "bereshit bara elohim et ha-shamayim ve-et ha-aretz",
    zh: "起初，神创造天地。",
    en: "In the beginning God created the heaven and the earth.（KJV）",
    source: "《创世记》1:1 马所拉文本；Mechon-Mamre / Sefaria / BibleHub。",
    status: "已核准"
  },
  {
    key: "greek", script: "greek", dir: "ltr",
    title: "希腊文 · 《伊利亚特》首行",
    caption: "从左往右——希腊文早期曾用牛耕式，后定为左起（呼应『字怎么走』那块反牛耕）。",
    original: "μῆνιν ἄειδε, θεά, Πηληϊάδεω Ἀχιλῆος",
    translit: "mēnin aeide, theá, Pēlēïádeō Achilēos",
    zh: "歌唱吧，女神，佩琉斯之子阿基琉斯的愤怒。",
    en: "Sing, goddess, the wrath of Achilles, son of Peleus.",
    source: "荷马《伊利亚特》1.1，Munro & Allen 校本；Perseus（perseus.tufts.edu）。",
    status: "已核准"
  },
  {
    key: "latin", script: "latin", dir: "ltr",
    title: "拉丁文 · 《埃涅阿斯纪》首行",
    caption: "承希腊左起——今日多数文字的走向。",
    original: "Arma virumque cano, Troiae qui primus ab oris",
    translit: "",
    zh: "我歌唱武器与那个人——他最先从特洛伊的海岸……",
    en: "I sing of arms and the man, who first from the shores of Troy…",
    source: "维吉尔《埃涅阿斯纪》1.1；Harvard Classics、AP Latin。",
    status: "已核准"
  },
  {
    key: "sanskrit", script: "sanskrit", dir: "ltr",
    title: "梵文（天城体）· 真理必胜",
    caption: "从左往右，字母悬于一道横画（शिरोरेखा）之下。",
    original: "सत्यमेव जयते",
    translit: "satyam-eva jayate",
    zh: "唯真理胜（不在虚妄）。",
    en: "Truth alone triumphs (not falsehood).",
    source: "《剑奥义书》（Muṇḍaka Upaniṣad）3.1.6；印度国训。Wikipedia「Satyameva Jayate」/ shlokam.org。",
    status: "已核准"
  }
];

/* ── 工具：转义文本，杜绝 HTML 注入；译文逐字照录 ── */
function esc(s) {
  return String(s == null ? "" : s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

/* ── 译文里内容档用 " / " 表示换行（诗行）；渲染成 <br> ── */
function withBreaks(s) {
  return esc(s).replace(/\s*\/\s*/g, "<br>");
}

/* ── 渲染一块 ── */
function renderEntry(e) {
  const block = document.createElement("div");
  block.className = "block";

  const pending = e.status !== "已核准";
  const badge = pending
    ? '<span class="badge pending">待核</span>'
    : '<span class="badge ok">已核准</span>';

  const glossZh = e.zh ? '<div class="gloss"><span class="label">中</span>' + esc(e.zh) + '</div>' : "";
  const glossEn = e.en ? '<div class="gloss en"><span class="label">英</span>' + withBreaks(e.en) + '</div>' : "";
  const translit = e.translit ? '<div class="translit">' + esc(e.translit) + '</div>' : "";
  const pendingNote = pending
    ? '<div class="gloss" style="color:var(--pending)">译文待核准，暂不作语言权威。</div>'
    : "";

  block.innerHTML =
    '<div class="block-head">' +
      '<span class="block-title">' + esc(e.title) + '</span>' + badge +
    '</div>' +
    '<div class="block-caption">' + esc(e.caption) + '</div>' +
    '<div class="original dir-' + e.dir + ' script-' + e.script + '">' + esc(e.original) + '</div>' +
    translit + glossZh + glossEn + pendingNote +
    '<div class="source"><span class="label">出处　</span>' + esc(e.source) + '</div>';

  return block;
}

/* ── 主渲染：动态按条目数，过滤掉「待核」不上线（硬约束 ④）── */
function render() {
  const root = document.getElementById("blocks");
  root.innerHTML = "";
  const live = ENTRIES.filter(e => e.status === "已核准");

  // 七块同启：容器一齐淡入（不再错峰），紧接着各块沿自己方向「走」。
  live.forEach((e) => {
    const block = renderEntry(e);
    root.appendChild(block);
    block.style.animation = `fadein 0.45s ease both`;
  });
}

/* ── 让七块同时「走」：给每块 .original 加 .writing 重启揭示动画 ──
   只动 mask（先成形、后揭示），不碰文字本身，故连笔/shaping 不破。 */
function playAll() {
  const origs = document.querySelectorAll(".original");
  origs.forEach(o => {
    o.classList.remove("writing");
    void o.offsetWidth;        // 强制 reflow，使动画可重启
    o.classList.add("writing");
  });
}

render();

const replayBtn = document.getElementById("replay");
if (replayBtn) replayBtn.addEventListener("click", playAll);

const reduceMotion = window.matchMedia &&
  window.matchMedia("(prefers-reduced-motion: reduce)").matches;

if (!reduceMotion) {
  // 进页面自动走一遍——直接回应「没有字在走的感觉」。
  requestAnimationFrame(() => requestAnimationFrame(playAll));
}
</script>
</body>
</html>
